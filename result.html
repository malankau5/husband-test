<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>테스트 결과</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="container fade">

    <h1 class="main-title">
        💗 테스트 결과
    </h1>

    <p class="sub-title">
        유예정님과의<br>
        궁합 결과입니다.
    </p>

    <div class="result-card">

        <img
            id="resultPhoto"
            class="result-photo"
            src=""
            alt="프로필">

        <div
            id="percent"
            class="result-score">

            0%

        </div>

        <div
            id="userName"
            class="result-name">

        </div>

        <div
            id="resultTitle"
            class="result-title">

        </div>

        <p
            id="resultDescription"
            class="result-desc">

        </p>

        <div 
            id="myRank" 
            class="result-rank" style="display:none;">
        </div>

    </div>

   <button
        id="rankingBtn"
        class="sub-btn">

    🏆 랭킹 보기

    </button>

    <button
        id="restartBtn"
        class="sub-btn">

        🔄 다시 테스트

    </button>

    <button
        id="shareBtn"
        class="sub-btn">

        📤 결과 공유

    </button>

</div>

<script src="js/questions.js"></script>
<script src="js/result.js"></script>

</body>
</html>
