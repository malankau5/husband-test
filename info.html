<!DOCTYPE html>
<html lang="ko">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>참가자 정보 입력</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <h1>참가자 정보</h1>

    <p class="sub">
        아래 정보를 입력해주세요.
    </p>

    <!-- 프로필 -->

    <label class="input-title">프로필 사진</label>

    <label class="photo-upload">

        <input
            type="file"
            id="photo"
            accept="image/*"
            hidden
        >

        <div class="photo-circle" id="photoPreview">

            <span>
                프로필 사진을<br>
                선택해 주세요.
            </span>

        </div>

    </label>

    <!-- 이름 -->

    <label class="input-title">이름</label>

    <input
        type="text"
        id="name"
        placeholder="이름을 입력하세요"
    >

    <!-- 전화번호 -->

    <label class="input-title">전화번호</label>

    <div class="input-row">

        <input
            type="tel"
            id="phone"
            placeholder="010-1234-5678"
        >

        <button
            id="sendCode"
            class="side-btn"
        >
            받기
        </button>

    </div>

    <!-- 인증번호 -->

    <label class="input-title">인증번호</label>

    <div class="input-row">

        <input
            type="text"
            id="code"
            placeholder="인증번호"
        >

        <button
            id="checkCode"
            class="side-btn"
        >
            확인
        </button>

    </div>

    <!-- 생년월일 -->

    <label class="input-title">생년월일</label>

    <div class="birth-row">

        <input
            type="number"
            id="birthYear"
            placeholder="YYYY"
        >

        <input
            type="number"
            id="birthMonth"
            placeholder="MM"
        >

        <input
            type="number"
            id="birthDay"
            placeholder="DD"
        >

    </div>

    <!-- 지역 -->

    <label class="input-title">지역</label>

    <select id="region">

        <option>서울</option>
        <option>경기</option>
        <option>인천</option>
        <option>강원</option>
        <option>충북</option>
        <option>충남</option>
        <option>전북</option>
        <option>전남</option>
        <option>경북</option>
        <option>경남</option>
        <option>제주</option>

    </select>

    <button
        id="next"
        class="main-btn"
    >
        다음
    </button>

</div>

<script src="js/info.js"></script>

</body>
</html>
